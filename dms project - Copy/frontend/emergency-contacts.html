<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emergency Contacts — DisasterShield</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    .contact-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
        padding: 24px 32px;
    }
    .contact-card {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        transition: transform 0.2s, border-color 0.2s;
    }
    .contact-card:hover {
        border-color: var(--accent-red);
        transform: translateY(-4px);
    }
    .contact-type {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 2px;
        color: var(--text-secondary);
    }
    .contact-name {
        font-family: var(--font-display);
        font-size: 22px;
        letter-spacing: 1px;
        color: var(--text-primary);
    }
    .contact-number {
        font-family: var(--font-mono);
        font-size: 18px;
        color: var(--accent-red);
        margin: 8px 0;
    }
    .btn-call {
        background: var(--accent-red);
        color: white;
        text-decoration: none;
        text-align: center;
        padding: 12px;
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 1px;
        font-weight: 600;
        transition: background 0.2s;
    }
    .btn-call:hover {
        background: #ff4444;
    }
    .icon-box {
        font-size: 24px;
        margin-bottom: 4px;
    }
  </style>
</head>
<body>

<div class="scanline-overlay"></div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <span class="logo-icon">⚠</span>
    <span class="logo-text">DISASTER<br><em>SHIELD</em></span>
  </div>
  <nav>
    <a href="index.html" class="nav-item"><span class="nav-icon">◈</span> Dashboard</a>
    <a href="report-incident.html" class="nav-item"><span class="nav-icon">◉</span> Report Incident</a>
    <a href="resources.html" class="nav-item"><span class="nav-icon">◧</span> Resources</a>
    <a href="alerts.html" class="nav-item"><span class="nav-icon">◬</span> Alerts</a>
    <a href="medical-camps.html" class="nav-item"><span class="nav-icon">✚</span> Medical Camps</a>
    <a href="emergency-contacts.html" class="nav-item active"><span class="nav-icon">☎</span> Emergency Contacts</a>
    <a href="shelters.html" class="nav-item"><span class="nav-icon">🏠</span> Shelters</a>
    <a href="relief-distribution.html" class="nav-item"><span class="nav-icon">📦</span> Relief Distribution</a>
  </nav>
  <div class="sidebar-footer">
    <div class="status-dot"></div> SYSTEM ONLINE
  </div>
</aside>

<!-- MAIN -->
<main class="main-content">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-left">
      <h1 class="page-title">EMERGENCY CONTACTS</h1>
      <span class="page-sub">DIRECT LINES TO CRITICAL SERVICES</span>
    </div>
  </header>

  <section class="contact-grid" id="contacts-container">
    <div style="text-align:center;padding:3rem;opacity:.5;grid-column:1/-1">Loading contacts...</div>
  </section>

</main>

<script>
const BASE = '/disaster';

async function loadContacts() {
    const container = document.getElementById('contacts-container');
    try {
        const res = await fetch(`${BASE}/EmergencyContactServlet`);
        const data = await res.json();
        
        if (!data.length) {
            container.innerHTML = '<div style="text-align:center;padding:3rem;opacity:.5;grid-column:1/-1">No contacts found.</div>';
            return;
        }

        const icons = {
            'POLICE': '👮',
            'FIRE': '🚒',
            'AMBULANCE': '🚑',
            'HELPLINE': '📞',
            'EMERGENCY': '🚨',
            'HOSPITAL': '🏥'
        };

        container.innerHTML = data.map(c => `
            <div class="contact-card">
                <div class="contact-type">${c.type}</div>
                <div class="icon-box">${icons[c.type] || '📞'}</div>
                <div class="contact-name">${c.name}</div>
                <div class="contact-number">${c.number}</div>
                <a href="tel:${c.number}" class="btn-call">📞 CLICK TO CALL</a>
            </div>
        `).join('');
    } catch (e) {
        container.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--accent-red);grid-column:1/-1">Connection failed.</div>';
    }
}

loadContacts();
</script>

</body>
</html>
